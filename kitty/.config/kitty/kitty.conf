# ENV
term xterm-256color

# FONT
font_family      Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# WINDOW
window_padding_width        0
hide_window_decorations     no
background_opacity          1.0
dynamic_background_opacity  no
confirm_os_window_close     0

# macOS-only equivalent of alacritty's "Buttonless" decorations
macos_titlebar_color        background
macos_show_window_title_in  none

# SCROLLING
scrollback_lines         100000
wheel_scroll_multiplier  5.0

# CURSOR
cursor_shape                 block
cursor_blink_interval        0.75
cursor_stop_blinking_after   0

# MOUSE
mouse_hide_wait  3.0
copy_on_select   no

# CLIPBOARD (matches alacritty osc52 = CopyPaste)
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append

# BELL
enable_audio_bell   no
visual_bell_duration 0.0

# SHELL
shell_integration enabled

# KEYBINDINGS
map page_up    scroll_home
map page_down  scroll_end
map shift+enter send_text all \x1b\r

# THEME (uncomment to use; kitty ships many in /usr/share/kitty/themes)
# include themes/Catppuccin-Macchiato.conf
# include themes/ayu.conf
